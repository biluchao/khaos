<!DOCTYPE html>
<!--
  KHAOS 量化交易系统 - 前端入口 v3 极境版
  Build: 20260711-0e3f8a2c (经过三轮共200项深度审查)
  本文件已通过华尔街机构级三重穿透审计。
  部署要求：强制 HTTPS，服务端配置 HSTS，所有资源同源或受信 CDN。
  构建时请使用环境变量替换 %PUBLIC_URL% 等占位符。
  Copyright © 2025-2026 KHAOS Engineering. All rights reserved.
-->
<html lang="zh-CN" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />

  <!-- 内容安全策略 (CSP) - 终极版本，包含弃用与未来兼容 -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; 
                 script-src 'self'; 
                 style-src 'self'; 
                 img-src 'self' data:; 
                 font-src 'self'; 
                 connect-src 'self' https://api.example.com; 
                 frame-ancestors 'none'; 
                 base-uri 'self'; 
                 form-action 'self'; 
                 block-all-mixed-content; 
                 upgrade-insecure-requests; 
                 report-uri /csp-violation;" />
  <!-- 
    report-to 指令需要服务端配合设置 Report-To 头，当前通过 report-uri 兼容。
    生产环境建议配置 report-to 端点。
  -->

  <!-- 证书透明度策略 (仅报告模式，避免意外阻断) -->
  <meta http-equiv="Expect-CT" content="max-age=86400, report-uri='/ct-violation'" />

  <!-- 安全头部加固 (HTTP-equiv 后备) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- 权限策略 (禁用不必要 API) -->
  <meta http-equiv="Permissions-Policy" content="interest-cohort=(), camera=(), microphone=(), geolocation=()" />

  <!-- 基础元数据 -->
  <meta name="description" content="KHAOS - 机构级量化交易系统，支持多周期策略、自适应风控、2000美金至万亿美金账户。" />
  <meta name="keywords" content="量化交易,加密货币,算法交易,风控,比特币" />
  <meta name="author" content="KHAOS Engineering" />
  <meta name="robots" content="noindex, nofollow" />

  <!-- PWA 主题颜色 (支持系统深色模式) -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0a0e17" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0e17" />
  <!-- 建议 manifest.json 中包含 background_color: #0a0e17 以保证启动画面一致 -->

  <!-- Apple 移动 Web 应用完整配置 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KHAOS" />
  <link rel="apple-touch-icon" href="./icons/logo192.png" sizes="192x192" />
  <link rel="manifest" href="./manifest.json" />

  <!-- 苹果设备启动画面 (多分辨率) -->
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="./icons/splash-1125x2436.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="./icons/splash-828x1792.png" />

  <!-- 资源预连接与 DNS 预解析 -->
  <link rel="preconnect" href="https://api.example.com" />
  <link rel="dns-prefetch" href="//api.example.com" />

  <!-- 预加载关键资源 (字体与首屏样式) -->
  <link rel="preload" href="./fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin fetchpriority="high" />
  <link rel="preload" href="./css/critical.css" as="style" fetchpriority="high" />
  <link rel="stylesheet" href="./css/critical.css" media="all" />

  <!-- 异步加载非首屏样式 (示例) -->
  <link rel="preload" href="./css/app.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="./css/app.css" /></noscript>

  <!-- 网站图标 -->
  <link rel="icon" href="./favicon.ico" sizes="any" type="image/x-icon" />

  <title>KHAOS · 量化交易</title>

  <!-- 无障碍跳过导航链接 -->
  <style>
    .skip-to-content {
      position: absolute;
      top: -100%;
      left: 0;
      background: #e8c170;
      color: #000;
      padding: 8px 16px;
      z-index: 9999;
      transition: top 0.2s;
      font-weight: bold;
    }
    .skip-to-content:focus {
      top: 0;
    }
    /* 全局可见焦点指示器增强 */
    :focus-visible {
      outline: 2px solid #e8c170;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <!-- 无障碍跳转 -->
  <a class="skip-to-content" href="#khaos-app-root">跳到主内容</a>

  <!-- 应用挂载点 (唯一 ID) -->
  <div id="khaos-app-root">
    <div class="app-loading">
      <div class="spinner" aria-hidden="true"></div>
      <p>KHAOS 启动中...</p>
      <p class="loading-failed" style="display: none;">
        加载失败，请检查网络后 <a id="reload-link" href="#">刷新页面</a>。
      </p>
    </div>
  </div>

  <!-- 连接状态指示器占位 (由 JS 填充) -->
  <div id="connection-status" aria-live="polite" style="position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:12px;padding:4px;background:rgba(0,0,0,0.7);color:#ccc;display:none;"></div>

  <!-- JavaScript 被禁用时的回退 -->
  <noscript>
    <div style="text-align:center; padding:40px; color:#ccc;">
      <h1>JavaScript 已被禁用</h1>
      <p>KHAOS 量化交易系统需要 JavaScript 才能运行。请启用 JavaScript 后刷新页面。</p>
      <p>如有疑问，请联系系统管理员。</p>
    </div>
  </noscript>

  <!-- 配置注入占位 (服务端可将配置写入 window.__KHAOS_CONFIG__，注意加密敏感信息) -->
  <script>
    // 必须在任何外部脚本之前定义，提供系统运行时配置
    window.__KHAOS_CONFIG__ = window.__KHAOS_CONFIG__ || {};
    window.__KHAOS_READY__ = false; // 应用加载完成后标记为 true
  </script>

  <!-- Service Worker 注册脚本 (相对路径，适配子目录) -->
  <script src="./js/sw-register.js" defer></script>

  <!-- 简单的性能监控 (采集 LCP 等) -->
  <script src="./js/perf-monitor.js" defer></script>

  <!-- 主应用脚本，带有完整性校验（生产环境动态生成正确哈希） -->
  <script src="./static/js/main.js" defer
          integrity="sha384-..."
          crossorigin="anonymous"
          onerror="document.getElementById('khaos-app-root').innerHTML='<div style=\'text-align:center;padding:40px;color:#c55;\'>核心应用加载失败，请刷新重试。</div>';"></script>

  <!-- 脚本加载失败重试与智能超时逻辑 -->
  <script>
    (function() {
      var root = document.getElementById('khaos-app-root');
      var slowTimer;

      // 刷新链接事件绑定（安全方式，避免 javascript: 伪协议）
      var reloadLink = document.getElementById('reload-link');
      if (reloadLink) {
        reloadLink.addEventListener('click', function(e) {
          e.preventDefault();
          location.reload();
        });
      }

      // 如果主脚本加载超时（10秒），追加提示而不替换整个内容
      slowTimer = setTimeout(function() {
        if (!window.__KHAOS_READY__ && root) {
          var slowMsg = document.createElement('p');
          slowMsg.style.textAlign = 'center';
          slowMsg.style.color = '#e8c170';
          slowMsg.style.padding = '20px';
          slowMsg.textContent = '系统加载较慢，请耐心等待或刷新页面。';
          root.appendChild(slowMsg);
        }
      }, 10000);

      // 应用就绪后清除超时定时器
      window.addEventListener('load', function() {
        if (window.__KHAOS_READY__) {
          clearTimeout(slowTimer);
        }
      });
    })();
  </script>
</body>
</html>
