# =============================================================================
# KHAOS 风险与资金管理配置文件 v25.0 (全功能集成版)
# =============================================================================
# 本文件定义系统的全局风险边界、资金管理规则、仓位控制、跟单及虚拟券商。
# 所有参数均经过超机构级审计，适配2000美金至万亿美金账户。
# 新增：百分比仓位、跟单账户、虚拟券商等全局配置。
# =============================================================================

# -----------------------------------------------------------------------------
# 基础风险预算
# -----------------------------------------------------------------------------
risk_budget:
  account_risk_per_trade: 0.01       # 单笔风险占净值比例
  auto_risk_adjust: true             # 小账户自动下调风险比例
  auto_risk_step: 0.001
  min_risk: 0.002
  allow_below_min_if_necessary: false

# -----------------------------------------------------------------------------
# 仓位管理 (百分比仓位)
# -----------------------------------------------------------------------------
position_sizing:
  method: percent_of_equity           # 仓位方法：固定净值百分比
  base_percent: 0.02                  # 每笔交易基础仓位 = 净值 * 2%
  min_notional_usd: 12                # 最小名义价值 (高于交易所最低要求)
  auto_round: true                    # 自动取整到最小交易单位
  max_position_percent: 0.30          # 单品种最大持仓占净值比例

# -----------------------------------------------------------------------------
# 账户最低余额保护
# -----------------------------------------------------------------------------
minimum_account_balance: 500          # 净值低于此值仅允许平仓

# -----------------------------------------------------------------------------
# 杠杆与敞口
# -----------------------------------------------------------------------------
leverage:
  max_leverage: 3.0
  max_total_delta: 3.0
  dynamic_delta_limit: true
  max_single_symbol_exposure_pct: 0.4
  correlation_aware_exposure: true
  max_positions_per_symbol: 1
  margin_mode: isolated
  verify_exchange_limits: true
  verify_margin_mode: true
  action_on_mismatch: adjust

# -----------------------------------------------------------------------------
# 亏损与熔断
# -----------------------------------------------------------------------------
loss_limits:
  max_daily_loss: 0.05
  max_consecutive_losses: 5
  daily_loss_or_consecutive: true
  circuit_breaker_behavior: manual_reset

  cool_down_after_loss: dynamic
  cool_down_rules:
    loss_under_2pct: 30
    loss_2_5pct: 60
    loss_above_5pct: 240
  consecutive_losses_multiplier: 1.5

  absolute_loss_thresholds:
    enabled: true
    trigger_amount_usd: 50            # 单日亏损超50美金额外冷却

# -----------------------------------------------------------------------------
# 利润保护
# -----------------------------------------------------------------------------
profit_protection:
  per_position: true
  profit_lock_steps:
    "1.0": 0.3
    "2.0": 1.0
    "3.0": 2.0
  trailing_after_lock: true
  max_profit_drawdown: 0.4
  hard_profit_drawdown: 0.6
  trend_strength_override:
    enable: true
    slope_threshold: 0.8
    drawdown_override: 0.5

# -----------------------------------------------------------------------------
# 波动率自适应防护
# -----------------------------------------------------------------------------
volatility_guard:
  enabled: true
  vol_target: 0.20
  vol_window: 30
  min_data_days: 15
  vol_guard_threshold_type: percentile
  vol_guard_threshold: 0.8
  min_abs_vol: 0.3
  vol_guard_action: reduce_leverage
  alternative_action: tighten_stops
  vol_guard_reduce_factor: 0.8
  vol_guard_min_leverage: 1.0
  vol_guard_restore_threshold: 0.6
  restore_cooldown_hours: 24

# -----------------------------------------------------------------------------
# 流动性约束
# -----------------------------------------------------------------------------
liquidity:
  max_order_book_ratio: auto
  auto_max_ratio: 0.01
  auto_max_ratio_based_on: top_10_levels
  orderbook_snapshot_staleness_ms: 500
  max_stale_count: 3
  min_24h_volume_btc: 100
  max_spread_pct: 0.1
  max_spread_pct_soft: 0.15
  low_liquidity_protection:
    enabled: true
    max_spread_pct_hard: 0.2
    min_24h_volume_btc_hard: 80
  withdrawal_freeze_protection: true

# -----------------------------------------------------------------------------
# 交易成本控制
# -----------------------------------------------------------------------------
cost_control:
  net_risk_reward_ratio: 1.5
  max_fee_per_trade_pct: 0.5
  max_total_fee_pct_per_day: 0.01
  funding_rate_history_days: 7

# -----------------------------------------------------------------------------
# 仓位管理
# -----------------------------------------------------------------------------
position_management:
  max_open_orders: 10
  max_pending_stop_orders: 5
  order_reconciliation_interval_sec: 60
  max_hold_bars: 300
  max_hold_bars_auto_scale: true
  max_consecutive_adds: 3
  aggregate_signals: true
  max_margin_utilization_pct: 0.85

# -----------------------------------------------------------------------------
# 资金费率与永续合约保护
# -----------------------------------------------------------------------------
funding_rate_protection:
  enabled: true
  close_bars_before: 3
  include_in_cost_estimate: true

# -----------------------------------------------------------------------------
# 连接与系统风险
# -----------------------------------------------------------------------------
connection_risk:
  loss_timeout_seconds: 60
  loss_action: reduce_only
  auto_restore_on_reconnect: false
  notify_on_restore_ready: true
  exchange_maintenance_action: close_only

# -----------------------------------------------------------------------------
# 黑天鹅与极端事件
# -----------------------------------------------------------------------------
black_swan:
  detection:
    single_day_move_pct: 20
    action: enter_readonly
  stablecoin_depeg:
    enabled: true
    threshold_pct: 0.02
    action: close_affected_positions
  chain_attack_protection:
    enabled: true

  apocalypse:
    trigger_conditions:
      - exchange_hacked
      - regulatory_shutdown
      - extreme_liquidity_crisis
    detection_source: exchange_status_api
    action: market_close_all
    offline_action_log: true

# -----------------------------------------------------------------------------
# 自我监控
# -----------------------------------------------------------------------------
self_monitoring:
  enabled: true
  max_open_signals_per_hour: 15
  max_close_signals_per_hour: 30
  pause_duration_minutes: 60
  max_pauses_per_day: 3
  auto_resume: false
  system_resource_monitor:
    enabled: true
    cpu_percent_threshold: 90
    memory_percent_threshold: 85

# -----------------------------------------------------------------------------
# 操作风险管理
# -----------------------------------------------------------------------------
operational:
  reduce_only_mode: false
  require_confirmation: true
  checkpoint_interval_bars: 100
  log_adapted_params: true
  log_skipped_trades: true
  max_time_deviation:
    warn_threshold_ms: 1000
    stop_threshold_ms: 3000
    consecutive_exceed_limit: 3
  delisting_protection:
    enabled: true
    check_interval_minutes: 30
    action: close_and_alert
  remote_key_revocation_endpoint: ${REVOKE_ENDPOINT}

# -----------------------------------------------------------------------------
# 跟单交易 (新增)
# -----------------------------------------------------------------------------
copy_trading:
  enabled: false
  master_account: "main"
  follower_accounts: 10
  allocation_mode: equal            # equal / proportional
  copy_ratio: 1.0
  slippage_tolerance_pct: 0.1       # 跟单允许的额外滑点
  max_latency_ms: 500               # 最大跟单延迟，超时放弃

# -----------------------------------------------------------------------------
# 虚拟券商 (模拟账户)
# -----------------------------------------------------------------------------
paper_broker:
  enabled: true
  initial_balance: 2000             # 初始模拟资金
  fee_model: real                   # real / zero / fixed
  slippage_model: dynamic           # 复用主执行层滑点模型

# -----------------------------------------------------------------------------
# 风险报告
# -----------------------------------------------------------------------------
risk_report:
  daily_summary: true
  intraday_snapshot_interval_min: 60

# -----------------------------------------------------------------------------
# 通知与告警
# -----------------------------------------------------------------------------
risk_notifications:
  circuit_breaker_notify: true
  drawdown_alert_threshold_pct: 0.03
  profit_target_alert_pct: 0.15
  rate_limit:
    max_per_hour: 5
