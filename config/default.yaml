# =============================================================================
# KHAOS 量化交易系统 - 主配置文件 v25.0 (全功能集成版)
# =============================================================================
# 此文件是系统运行的唯一真实来源，包含所有子系统配置。
# 新增：游击追仓、百分比仓位、跟单、虚拟券商、模块红绿灯监控等全局开关。
# 所有参数均经过超机构级审计，适配100美金至50万美金账户。
config_version: 25.0

# -----------------------------------------------------------------------------
# 全局系统设置
# -----------------------------------------------------------------------------
system:
  mode: live                      # paper / live / readonly / hybrid
  name: KHAOS-Main
  timezone: UTC
  log_level: INFO                 # 生产环境将被强制覆盖为 WARNING
  debug: false                    # 生产环境强制 false
  exit_on_fatal: true
  shutdown_timeout_sec: 10
  market_type: crypto
  exchange_timezone_validation: true
  panic_stop:
    enabled: true
    trigger: extreme_order_rate

# -----------------------------------------------------------------------------
# API 服务
# -----------------------------------------------------------------------------
api:
  host: 0.0.0.0
  port: 8000
  workers: auto                   # min(4, cpu_count)
  allowed_ips: []

# -----------------------------------------------------------------------------
# 部署环境
# -----------------------------------------------------------------------------
deployment:
  environment: production
  upgrade:
    auto_migrate: true
    migration_lock: true

# -----------------------------------------------------------------------------
# 健康检查
# -----------------------------------------------------------------------------
healthcheck:
  readiness: /ready
  liveness: /live
  interval_sec: 30

# -----------------------------------------------------------------------------
# 性能阈值
# -----------------------------------------------------------------------------
performance:
  max_cpu_pct: 80
  max_memory_pct: 85
  action_on_threshold: throttle

# -----------------------------------------------------------------------------
# 遥测与监控
# -----------------------------------------------------------------------------
telemetry:
  enabled: true
  metrics_path: /metrics
  metrics_port: 8001
  metrics_interval: 5s
  metrics_auth: false

# -----------------------------------------------------------------------------
# 模块监控 (红绿灯面板数据源)
# -----------------------------------------------------------------------------
module_monitoring:
  enabled: true
  check_interval_sec: 10
  modules:
    - KMA
    - HMM
    - TrendProbabilityFilter
    - EscapeDetector
    - Recapture
    - CallbackDrop
    - PullbackAdd
    - GuerrillaChase
    - PaperBroker
    - CopyTrading
    - RiskFirewall
    - OrderManager
    - DataFeed
    - Exchange

# -----------------------------------------------------------------------------
# 通知与告警
# -----------------------------------------------------------------------------
notifications:
  enabled: true
  circuit_breaker_notify: true
  quiet_hours:
    enabled: false
    start: "23:00"
    end: "07:00"
    allow_p0: true
  channels:
    telegram:
      enabled: false
      bot_token: ${TELEGRAM_BOT_TOKEN}
      chat_id: ${TELEGRAM_CHAT_ID}
    email:
      enabled: false
      smtp_server: smtp.example.com
      smtp_port: 587
      username: ${EMAIL_USER}
      password: ${EMAIL_PASS}
      recipients: []
    sms:
      enabled: false

# -----------------------------------------------------------------------------
# 自动备份
# -----------------------------------------------------------------------------
backup:
  enabled: true
  interval_hours: 6
  database_backup_retention_days: 30
  audit_log_retention_days: 1825
  path: /opt/khaos/backups

# -----------------------------------------------------------------------------
# 前端设置
# -----------------------------------------------------------------------------
frontend:
  cors_origins: ${ALLOWED_ORIGINS:-["http://localhost:3000"]}
  allow_headers: ["*"]

# -----------------------------------------------------------------------------
# 黑天鹅与极端事件
# -----------------------------------------------------------------------------
black_swan:
  detection:
    single_day_move_pct: 20
    action: enter_readonly
  stablecoin_depeg:
    enabled: true
    threshold_pct: 0.02
    action: close_affected_positions
  apocalypse:
    trigger_conditions:
      - exchange_hacked
      - regulatory_shutdown
      - extreme_liquidity_crisis
    action: market_close_all

# -----------------------------------------------------------------------------
# 策略核心配置
# -----------------------------------------------------------------------------
strategy:
  # 引入外部策略文件（可覆盖默认值）
  config_file: config/strategy.yaml
  # 下面列出全局策略开关（策略参数细节在 strategy.yaml）
  guerrilla_chase:
    enabled: true                 # 游击追仓总开关
  copy_trading:
    enabled: false                # 跟单交易总开关
  paper_broker:
    enabled: true                 # 虚拟券商总开关

# -----------------------------------------------------------------------------
# 风险与资金管理
# -----------------------------------------------------------------------------
risk:
  config_file: config/risk.yaml   # 风险参数细节在 risk.yaml
  position_sizing:
    method: percent_of_equity     # 百分比仓位
    base_percent: 0.02            # 2%基础仓位

# -----------------------------------------------------------------------------
# 执行层配置
# -----------------------------------------------------------------------------
execution:
  config_file: config/execution.yaml

# -----------------------------------------------------------------------------
# 数据源配置
# -----------------------------------------------------------------------------
data_sources:
  config_file: config/data_sources.yaml

# -----------------------------------------------------------------------------
# 进化与在线学习
# -----------------------------------------------------------------------------
evolution:
  config_file: config/evolution.yaml

# -----------------------------------------------------------------------------
# 日志与审计
# -----------------------------------------------------------------------------
logging:
  config_file: config/logging.yaml

audit:
  enabled: true
  storage_type: database
  immutable: true
  immutable_backend: database_chain
  signature_algorithm: SHA256withRSA
  private_key_path: ${KHAOS_AUDIT_KEY_PATH}
  decision_snapshot: true
  intent_log: true
  snapshot_retention_days: 365
