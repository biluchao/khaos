# =============================================================================
# KHAOS 量化交易系统 - 主配置文件 v8.0 (末日生存级)
# =============================================================================
# 历经八轮超机构审查，本文件可承受已知的所有极端市场与运维场景。
# 所有参数均设定安全边界，敏感信息必须通过环境变量或KMS注入。
config_version: 8.0

# -----------------------------------------------------------------------------
# 全局系统设置
# -----------------------------------------------------------------------------
system:
  mode: live                      # paper / live / readonly / hybrid
  name: KHAOS-Main
  timezone: UTC
  log_level: INFO                 # 系统日志，生产强制WARNING，但审计日志独立
  debug: false                    # 生产强制false
  exit_on_fatal: true
  shutdown_timeout_sec: 10
  market_type: crypto
  exchange_timezone_validation: true
  panic_stop:
    enabled: true
    trigger: extreme_order_rate  # 还可扩展为 latency_spike, drawdown_waterfall

# -----------------------------------------------------------------------------
# API 服务
# -----------------------------------------------------------------------------
api:
  host: 0.0.0.0
  port: 8000
  workers: auto                   # min(4, cpu_count)
  allowed_ips: []                 # 留空表示不限制，生产建议填入

# -----------------------------------------------------------------------------
# 部署环境
# -----------------------------------------------------------------------------
deployment:
  environment: production
  upgrade:
    auto_migrate: true
    migration_lock: true          # 迁移时禁止其他实例启动

# -----------------------------------------------------------------------------
# 健康检查
# -----------------------------------------------------------------------------
healthcheck:
  readiness: /ready               # 所有组件就绪后返回200
  liveness: /live                 # 基本存活检查
  interval_sec: 30

# -----------------------------------------------------------------------------
# 性能阈值
# -----------------------------------------------------------------------------
performance:
  max_cpu_pct: 80
  max_memory_pct: 85
  action_on_threshold: throttle   # throttle / pause / shutdown

# -----------------------------------------------------------------------------
# 遥测与监控
# -----------------------------------------------------------------------------
telemetry:
  enabled: true
  metrics_path: /metrics
  metrics_port: 8001
  metrics_interval: 5s
  metrics_auth: false             # 可设为 basic

# -----------------------------------------------------------------------------
# 通知与告警
# -----------------------------------------------------------------------------
notifications:
  enabled: true
  circuit_breaker_notify: true
  quiet_hours:
    enabled: false                # UTC 时间
    start: 23:00
    end: 07:00
    allow_p0: true
  channels:
    telegram:
      enabled: false
      bot_token: ${TELEGRAM_BOT_TOKEN}
      chat_id: ${TELEGRAM_CHAT_ID}
    email:
      enabled: false
      smtp_server: smtp.example.com
      smtp_port: 587
      username: ${EMAIL_USER}
      password: ${EMAIL_PASS}
      recipients: []
    sms:
      enabled: false
      provider: twilio
      account_sid: ${TWILIO_SID}
      auth_token: ${TWILIO_TOKEN}
      from_number: ""
      to_numbers: []

# -----------------------------------------------------------------------------
# 自动备份
# -----------------------------------------------------------------------------
backup:
  enabled: true
  interval_hours: 6
  database_backup_retention_days: 30
  audit_log_retention_days: 1825  # 5年监管要求
  path: /opt/khaos/backups

# -----------------------------------------------------------------------------
# 前端设置
# -----------------------------------------------------------------------------
frontend:
  cors_origins: ${ALLOWED_ORIGINS:-["http://localhost:3000"]}
  allow_headers: ["*"]

# -----------------------------------------------------------------------------
# 黑天鹅与极端事件
# -----------------------------------------------------------------------------
black_swan:
  detection:
    single_day_move_pct: 20       # 单日涨跌幅超此值触发
    action: enter_readonly

stablecoin_depeg:
  enabled: true
  threshold_pct: 0.02             # 稳定币偏离锚定超过2%

apocalypse:
  trigger_conditions: 
    - exchange_hacked
    - regulatory_shutdown
    - extreme_liquidity_crisis
  action: market_close_all
  contact_offline: true

# -----------------------------------------------------------------------------
# 策略核心配置
# -----------------------------------------------------------------------------
strategy:
  symbols:
    - BTCUSDT
  symbols_config:                 # 每个品种独立参数
    BTCUSDT:
      max_leverage_override: 3.0
      min_volatility_atr: 50
  primary_interval: 3m
  secondary_intervals:
    - 5m
    - 15m

  multi_symbol:
    enabled: false
    max_concurrent_symbols: 3
    risk_budget_allocation_pct: 0.5  # 占账户风险预算比例

  hierarchy:
    strict: true
    enabled: true

  regime:
    detector: MarketRegimeMonitor
    confirm_bars: 6
    hysteresis_bars: 15
    range_detection:
      adx_period: 14
      adx_threshold: 20
      kma_slope_threshold: 0.01
      bb_bandwidth_percentile: 20

  kalman:
    q_ratio: 0.01
    delta: 1.0e-5
    adaptive_q: true
    min_q_ratio: 0.001
    max_q_ratio: 0.1
    q_ratio_jitter: 0.01
    max_q_jitter: 0.02

  hmm:
    auto_select: true
    min_states: 2
    max_states: 5
    bic_period: 500
    n_states: 3
    retrain_interval: 500
    warmup_bars: 300               # 启动时根据主周期计算
    feature_window: 20
    model_type: GaussianHMM

  trend_prob_filter:
    enabled: true
    adaptive_bands: true
    adaptive_bands_config:
      window: 200
      low_percentile: 20
      high_percentile: 80
      outlier_robust: true
      ema_halflife: 100
    chaos_half_width: 0.5
    transition_end: 1.5
    prob_threshold: 0.7
    require_consecutive_outward: true
    consecutive_bars: 2
    allow_direction_switch: true
    gap_exemption: true
    gap_penalty_coeff: 0.7
    volume_confirm: true

  escape:
    enabled: true
    dynamic_thresholds: true
    threshold_map:
      slope_above_0.8: { warn_offset: 0.1, danger_offset: 0.05 }
    weights:
      momentum: 0.3
      volatility: 0.2
      micro: 0.2
      sr: 0.15
      wave: 0.15
    crisis_weight_override:
      vol_percentile: 99
      micro_weight_mult: 2.0
      momentum_weight_mult: 0.5
    thresholds:
      warn: 0.4
      danger: 0.65
    cooldown_bars: 10
    strong_trend_exemption: true
    exemption_prob_source: primary

  recapture:
    enabled: true
    prob_threshold: 0.65
    recapture_coeff: 0.6
    max_window_bars: auto
    window_bars_map: { "3m": 30, "5m": 20, "15m": 12 }  # 基准值，实际动态调整
    min_window_atr_mult: 0.5
    resonance_boost: 1.3
    resonance_penalty: 0.7
    false_break_restart: true
    max_restarts: 2

  callback_drop:
    enabled: true
    require_escape_trigger: true
    max_bars_after_escape: 30
    extend_on_low_volatility: true
    drop_prob_threshold: 0.7
    position_coeff: 0.5
    stop_tight_atr: 0.2
    trail_atr: 0.3
    lower_band_atr_offset: 0.5
    prob_weights:
      price_action: 0.3
      momentum: 0.3
      micro: 0.25
      timeframe: 0.15
    cooldown_bars: 10

  pullback_add:
    enabled: true
    prob_threshold: 0.7
    position_coeff: 0.8
    consolidation_min_bars: 3
    consolidation_max_bars: 8
    near_ma_atr: 0.3
    stop_atr: 0.2
    trail_atr_mult: 0.8
    prob_weights:
      structure: 0.35
      momentum: 0.30
      volume_micro: 0.25
      timeframe: 0.10
    cooldown_bars: 8
    failure_cooldown_minutes: 60
    volume_filter: true
    volume_filter_threshold: 0.6
    adaptive_volume_threshold: true

  micro_pullback_scalper:
    enabled: false
    min_trend_slope: 0.05
    max_retrace_atr: 0.8
    min_retrace_atr: 0.3
    position_coeff: 0.3
    target_atr_mult: 1.5
    stop_atr: 0.2

  micro_divergence_trader:
    enabled: false
    rsi_period: 7
    min_slope_strength: 0.1
    position_coeff: 0.2
    target_atr: 0.8
    stop_atr: 0.2

  range_modules:
    enabled_all: false
    enabled_all_preserve_custom: true
    range_grid:
      enabled: false
      grid_atr_mult: 0.5
      position_coeff: 0.5
      upper_buffer: 0.2
      lower_buffer: 0.2
    volume_profile_mr:
      enabled: false
      poc_deviation_atr: 0.5
      position_coeff: 0.3
      stop_atr: 0.3
    vol_squeeze_breakout:
      enabled: false
      bb_period: 20
      squeeze_threshold: 0.5
      position_coeff: 0.4
    micro_scalp_obi:
      enabled: false
      bpi_threshold: 0.3
      takerflow_threshold: 0.1
      position_coeff: 0.1
      target_atr: 0.3
      stop_atr: 0.2
      max_freq_per_min: 1

  wave_similarity:
    enabled: false
    min_similarity: 0.4
    boost_factor: 0.1
    max_boost: 0.5
    tight_stop_ratio: 0.7
    max_pattern_count: 1000
    eviction_policy: LRU

  resonance:
    enabled: true
    weight: 0.5
    max_boost: 1.5
    min_reduce: 0.3
    smooth_halflife: auto
    auto_halflife_atr_low: 6
    auto_halflife_atr_high: 2
    max_position_change_ratio: 0.2
    skip_ratio_on_gap: true

  adaptive_sr:
    enabled: true
    method: swing_volume
    swing_lookback: 5
    min_swing_distance_atr: 0.5
    regime_confirm_bars: 6
    freeze_on_regime: true
    recalc_on_regime_change: true
    min_sr_distance_atr: 0.3

# -----------------------------------------------------------------------------
# 风险与资金管理
# -----------------------------------------------------------------------------
risk:
  account_risk_per_trade: 0.01
  rebalance_frequency: daily
  auto_risk_adjust: true
  auto_risk_step: 0.001
  min_risk: 0.002
  max_total_delta: 3.0
  max_leverage: 3.0
  max_positions_per_symbol: 1
  max_single_symbol_exposure_pct: 0.4
  delta_calculation_method: net_liabilities
  margin_mode: isolated
  max_daily_loss: 0.05
  max_consecutive_losses: 5
  daily_loss_or_consecutive: true
  cool_down_after_loss: dynamic
  cool_down_rules:
    loss_under_2pct: 30
    loss_2_5pct: 60
    loss_above_5pct: 240
  consecutive_losses_multiplier: 1.5

  profit_lock_steps:
    1.0: 0.3
    2.0: 1.0
    3.0: 2.0
  max_profit_drawdown: 0.4
  hard_profit_drawdown: 0.6

  vol_target: 0.20
  vol_window: 30
  vol_guard: true
  vol_guard_threshold: 0.8
  vol_guard_action: reduce_leverage
  vol_guard_reduce_factor: 0.8
  vol_guard_min_leverage: 1.0
  vol_guard_restore_threshold: 0.6

  liquidity:
    max_order_book_ratio: auto
    auto_max_ratio: 0.01
    orderbook_snapshot_staleness_ms: 100
    min_24h_volume_btc: 100
    max_spread_pct: 0.1

  min_risk_reward_ratio: 1.5
  max_fee_per_trade_pct: 0.5

# -----------------------------------------------------------------------------
# 执行层配置
# -----------------------------------------------------------------------------
execution:
  default_order_type: limit
  maker_fee: -0.0002
  taker_fee: 0.0004
  fee_source: exchange_api
  fee_update_interval_min: 60
  slippage_model: dynamic
  slippage_params:
    orderbook_depth_weight: 0.5
    volatility_weight: 0.3
    recent_slippage_ema: 0.1
  max_slippage_pct: 0.2
  max_dynamic_slippage_pct: 1.0
  slippage_override_on_volatility: true
  max_open_orders: 10
  order_reconciliation_interval_sec: 30

  twap:
    enabled: true
    slice_interval_sec: 30
    max_duration_sec: 120
    auto_extend_duration: true
    max_auto_duration_sec: 600
    min_slice_size_auto: true
    min_slice_size: 0.001

  order_timeout_sec: dynamic
  timeout_range: { min: 10, max: 60 }
  retry_attempts: 2
  retry_backoff_base: 1.0

  exchange:
    primary: binance
    secondary: okx
    use_secondary_on_fail: true
    failover_conditions:
      max_latency_ms: 500
      error_rate: 0.05
      consecutive_errors: 3
    detect_maintenance: true
    health_check_interval_sec: 10

# -----------------------------------------------------------------------------
# 数据源配置
# -----------------------------------------------------------------------------
data_sources:
  exchange_timezone: UTC
  binance:
    rest_url: https://api.binance.com
    ws_url: wss://stream.binance.com:9443/ws
    rest_rate_limit: 1200
    combined_streams_limit: 200
  okx:
    rest_url: https://www.okx.com
    ws_url: wss://ws.okx.com:8443/ws/v5
    rest_rate_limit: 600
    combined_streams_limit: 100

  quality:
    max_gap_bars: 5
    max_timestamp_deviation_ms: 500
    outlier_price_filter: true
    outlier_method: mad
    mad_threshold: 8.0
    max_price_change_pct: 5.0
    use_log_price: true

# -----------------------------------------------------------------------------
# 进化与在线学习
# -----------------------------------------------------------------------------
evolution:
  online_tuning:
    enabled: false
    safety:
      max_allowed_dd_increase: 0.02
      auto_rollback: true
      validation_window_bars: 2000
      version_retention: 10
  bapo:
    enabled: false
    schedule: monthly
    window_bars: 12000
    min_trades: 50
    n_init: 20
    n_iter: 80
    max_dd_limit: 0.15
    smooth_factor: 0.7
    smooth_halflife: 3
  rl:
    enabled: false
    algorithm: ddqn
    epsilon: 0.05
    finetune_lr: 1.0e-5
    finetune_interval: daily
    rollback_losses: 8
    rollback_dd: 0.03              # 小于 max_daily_loss
  meta:
    enabled: false
    adapt_bars_min: 500
    inner_steps: 3
  gan_stress:
    enabled: false
    schedule: monthly
    scenarios: 1000
    quality_check:
      max_price_change_pct: 5
      distribution_similarity_threshold: 0.8
  param_sanity_bounds: /opt/khaos/config/param_bounds.yaml

# -----------------------------------------------------------------------------
# 日志与审计
# -----------------------------------------------------------------------------
logging:
  version: 1
  format: standard                 # standard / json
  log_sanitization: true          # 自动遮蔽密钥等敏感字段
  audit_log_level: INFO           # 审计日志独立级别，不受系统日志影响
  formatters:
    standard:
      format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    json:
      format: '{"time": "%(asctime)s", "level": "%(levelname)s", "name": "%(name)s", "message": "%(message)s"}'
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: standard
    file:
      class: logging.handlers.TimedRotatingFileHandler
      filename: ${KHAOS_LOG_DIR:/var/log/khaos}/system.log
      when: midnight
      backupCount: 30
      level: INFO
      formatter: standard
  root:
    level: INFO
    handlers: [console, file]

audit:
  enabled: true
  storage_type: database
  immutable: true
  immutable_backend: database_chain
  signature_algorithm: SHA256withRSA
  private_key_path: ${KHAOS_AUDIT_KEY_PATH}
  fallback_to_software_key: false  # HSM不可用则拒绝启动
  decision_snapshot: true
  intent_log: true
  snapshot_retention_days: 365
