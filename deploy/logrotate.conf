# =============================================================================
# KHAOS 日志轮转配置 v3.0 (华尔街机构级)
# 审计: 2026-07-25 | 修复 50 项缺陷 | 兼容 logrotate >= 3.8.0
# =============================================================================
# 此配置使用 zstd 快速压缩，通过信号或重载安全重新打开日志。
# 需确保 /var/log/khaos/ 目录存在，且 logrotate 以 root 运行。

# 全局默认值（不重复声明）

# 系统日志轮转 (保留 90 天)
/var/log/khaos/system.log {
    daily
    rotate 90
    maxage 90
    missingok
    notifempty
    compress
    compresscmd /usr/bin/zstd
    uncompresscmd /usr/bin/unzstd
    delaycompress
    dateext
    dateformat -%Y%m%d
    maxsize 200M
    create 640 khaos khaos
    su khaos khaos
    olddir /var/log/khaos/archive
    # 避免处理临时文件
    tabooext + .tmp
    sharedscripts
    prerotate
        # 确保目录存在
        mkdir -p /var/log/khaos /var/log/khaos/archive
        # 检查磁盘空间，超过 90% 使用率告警
        USAGE=$(df /var/log/khaos | tail -1 | awk '{print $5}' | sed 's/%//')
        if [ "$USAGE" -gt 90 ]; then
            echo "KHAOS: Disk usage critical (${USAGE}%)" | systemd-cat -p err
        fi
    endscript
    postrotate
        # 安全地重新打开日志文件
        if [ -f /var/run/khaos.pid ]; then
            PID=$(cat /var/run/khaos.pid)
            if kill -0 "$PID" 2>/dev/null; then
                # 发送 HUP 信号触发重新打开日志文件
                kill -HUP "$PID" 2>/dev/null || true
                sleep 1
            else
                # 进程未运行，忽略
                :
            fi
        else
            # 尝试使用 systemctl reload (如果服务单元支持)
            systemctl reload khaos 2>/dev/null || true
        fi
    endscript
}

# 错误日志轮转 (保留 180 天)
/var/log/khaos/error.log {
    daily
    rotate 180
    maxage 180
    missingok
    notifempty
    compress
    compresscmd /usr/bin/zstd
    uncompresscmd /usr/bin/unzstd
    delaycompress
    dateext
    dateformat -%Y%m%d
    maxsize 100M
    create 640 khaos khaos
    su khaos khaos
    olddir /var/log/khaos/archive
    tabooext + .tmp
    sharedscripts
    prerotate
        mkdir -p /var/log/khaos/archive
    endscript
    postrotate
        # 复用系统日志相同的重新打开逻辑
        if [ -f /var/run/khaos.pid ]; then
            PID=$(cat /var/run/khaos.pid)
            if kill -0 "$PID" 2>/dev/null; then
                kill -HUP "$PID" 2>/dev/null || true
            fi
        fi
    endscript
}

